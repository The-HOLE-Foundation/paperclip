<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <text x="48" y="48" font-size="28" font-weight="700" stroke="none" fill="#000">Project tile — customize icon &amp; color</text>
  <text x="48" y="80" font-size="14" stroke="none" fill="#666">Default is a neutral gray rounded rectangle with a folder icon. Clicking the tile opens a picker.</text>

  <!-- default tile -->
  <text x="48" y="140" font-size="20" font-weight="600" stroke="none" fill="#000">Default (neutral)</text>
  <g transform="translate(48,160)">
    <rect width="40" height="32" rx="8" fill="#e6e6e6" stroke="#666" />
    <path d="M10 12 l9 0 l3 -4 l8 0 l0 16 l-20 0 z" fill="#fff" stroke="#666" />
  </g>
  <text x="104" y="182" font-size="14" stroke="none" fill="#666">Onboarding v3</text>

  <!-- customized examples -->
  <text x="48" y="248" font-size="20" font-weight="600" stroke="none" fill="#000">After customizing (color + icon)</text>
  <g transform="translate(48,268)">
    <rect width="40" height="32" rx="8" fill="#fff" stroke="#000" />
    <circle cx="20" cy="16" r="7" fill="none" stroke="#000" />
  </g>
  <g transform="translate(104,268)">
    <rect width="40" height="32" rx="8" fill="#fff" stroke="#000" />
    <polygon points="20,7 24,15 16,15" fill="none" stroke="#000" />
  </g>
  <g transform="translate(160,268)">
    <rect width="40" height="32" rx="8" fill="#fff" stroke="#000" />
    <rect x="12" y="9" width="16" height="14" rx="2" fill="none" stroke="#000" />
  </g>
  <text x="216" y="290" font-size="12" stroke="none" fill="#666">(swatch fill shown gray here — monochrome wireframe)</text>

  <!-- picker popover -->
  <text x="048" y="356" font-size="20" font-weight="600" stroke="none" fill="#000">Picker popover</text>
  <g transform="translate(48,376)">
    <rect width="320" height="296" rx="8" fill="#fff" stroke="#000" />
    <text x="20" y="36" font-size="14" font-weight="600" stroke="none" fill="#000">Customize project tile</text>
    <line x1="0" y1="56" x2="320" y2="56" stroke="#666" />

    <text x="20" y="84" font-size="12" stroke="none" fill="#666">Color</text>
    <!-- color swatches grid -->
    <rect x="20" y="96" width="28" height="28" rx="6" fill="#e6e6e6" stroke="#000" />
    <rect x="56" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="92" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="128" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="164" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="200" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="236" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="272" y="96" width="28" height="28" rx="6" fill="#fff" stroke="#666" />

    <text x="20" y="160" font-size="12" stroke="none" fill="#666">Icon</text>
    <!-- icon grid -->
    <rect x="20" y="172" width="32" height="32" rx="6" fill="#fff" stroke="#000" />
    <path d="M28 184 l6 0 l2 -3 l6 0 l0 12 l-14 0 z" fill="#fff" stroke="#000" />
    <rect x="60" y="172" width="32" height="32" rx="6" fill="#fff" stroke="#666" />
    <circle cx="76" cy="188" r="7" fill="none" stroke="#666" />
    <rect x="100" y="172" width="32" height="32" rx="6" fill="#fff" stroke="#666" />
    <polygon points="116,179 122,197 110,197" fill="none" stroke="#666" />
    <rect x="140" y="172" width="32" height="32" rx="6" fill="#fff" stroke="#666" />
    <rect x="148" y="180" width="16" height="16" rx="2" fill="none" stroke="#666" />
    <rect x="180" y="172" width="32" height="32" rx="6" fill="#fff" stroke="#666" />
    <line x1="188" y1="196" x2="196" y2="180" stroke="#666" />
    <line x1="196" y1="196" x2="204" y2="180" stroke="#666" />
    <rect x="220" y="172" width="32" height="32" rx="6" fill="#fff" stroke="#666" />
    <text x="232" y="194" font-size="14" stroke="none" fill="#666">★</text>

    <!-- footer -->
    <line x1="0" y1="232" x2="320" y2="232" stroke="#666" />
    <g transform="translate(20,248)"><rect width="120" height="32" rx="4" fill="#fff" stroke="#666" /><text x="60" y="21" font-size="12" text-anchor="middle" stroke="none" fill="#000">Reset to gray</text></g>
    <g transform="translate(232,248)"><rect width="68" height="32" rx="4" fill="#000" /><text x="34" y="21" font-size="12" text-anchor="middle" stroke="none" fill="#fff">Save</text></g>
  </g>

  <g data-region="annotations">
    <rect x="48" y="160" width="40" height="32" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(104,144)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text></g>
    <text x="448" y="420" font-size="14" stroke="none" fill="#d33">— Same tile + picker is reused in the sidebar PROJECTS section and the Projects list rows.</text>
    <text x="448" y="444" font-size="14" stroke="none" fill="#d33">— Persisting color already exists (project.color). Icon needs a new project.icon field.</text>
  </g>
</svg>
