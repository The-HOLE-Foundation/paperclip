<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- ============ SIDEBAR (0..280) ============ -->
  <rect x="0" y="0" width="280" height="800" />

  <!-- Top bar: company name + search -->
  <text x="16" y="30" font-size="14" font-weight="700" stroke="none" fill="#000">Paperclip App</text>
  <rect x="240" y="12" width="24" height="24" rx="4" fill="#e6e6e6" stroke="#666" />
  <circle cx="249" cy="21" r="4" fill="none" stroke="#666" />
  <line x1="252" y1="24" x2="256" y2="28" stroke="#666" />

  <!-- ===== Top nav cluster ===== -->
  <!-- Conference room (NEW) — chat bubble icon -->
  <g>
    <rect x="8" y="56" width="264" height="32" fill="#fff" stroke="none" />
    <!-- chat bubble glyph -->
    <rect x="16" y="62" width="18" height="13" rx="3" fill="none" stroke="#000" />
    <polygon points="20,75 20,81 26,75" fill="#000" stroke="none" />
    <text x="44" y="77" font-size="14" stroke="none" fill="#000">Conference room</text>
  </g>
  <!-- New task (renamed from New Issue) -->
  <g>
    <rect x="16" y="94" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
    <line x1="20" y1="106" x2="28" y2="98" stroke="#666" />
    <text x="44" y="109" font-size="14" stroke="none" fill="#000">New task</text>
  </g>
  <!-- Dashboard -->
  <rect x="16" y="126" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="141" font-size="14" stroke="none" fill="#666">Dashboard</text>
  <!-- Inbox -->
  <rect x="16" y="158" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="173" font-size="14" stroke="none" fill="#666">Inbox</text>

  <!-- ===== WORK section ===== -->
  <text x="16" y="210" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">WORK</text>
  <!-- Issues -->
  <rect x="16" y="222" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="237" font-size="14" stroke="none" fill="#666">Issues</text>
  <!-- Projects (NEW nav item) — shown active/selected -->
  <rect x="8" y="250" width="264" height="32" fill="#e6e6e6" stroke="none" />
  <rect x="16" y="256" width="16" height="13" rx="2" fill="#fff" stroke="#000" />
  <path d="M16 259 l5 0 l2 -3 l4 0" fill="none" stroke="#000" />
  <text x="44" y="269" font-size="14" stroke="none" fill="#000">Projects</text>
  <!-- Artifacts (NEW) -->
  <rect x="16" y="290" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="305" font-size="14" stroke="none" fill="#000">Artifacts</text>
  <!-- Routines -->
  <rect x="16" y="322" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="337" font-size="14" stroke="none" fill="#666">Routines</text>
  <!-- Goals -->
  <rect x="16" y="354" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="369" font-size="14" stroke="none" fill="#666">Goals</text>

  <!-- ===== PROJECTS section ===== -->
  <text x="16" y="406" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">PROJECTS</text>
  <text x="248" y="406" font-size="14" stroke="none" fill="#666">+</text>
  <!-- Project rows: rounded-rectangle gray tile + folder glyph -->
  <g>
    <rect x="16" y="418" width="18" height="16" rx="4" fill="#e6e6e6" stroke="#666" />
    <path d="M20 423 l4 0 l1.5 -2 l4 0 l0 9 l-9.5 0 z" fill="#fff" stroke="#666" />
    <text x="44" y="431" font-size="14" stroke="none" fill="#666">Onboarding v3</text>
  </g>
  <g>
    <rect x="16" y="450" width="18" height="16" rx="4" fill="#e6e6e6" stroke="#666" />
    <path d="M20 455 l4 0 l1.5 -2 l4 0 l0 9 l-9.5 0 z" fill="#fff" stroke="#666" />
    <text x="44" y="463" font-size="14" stroke="none" fill="#666">NUX hardening</text>
  </g>
  <g>
    <rect x="16" y="482" width="18" height="16" rx="4" fill="#e6e6e6" stroke="#666" />
    <path d="M20 487 l4 0 l1.5 -2 l4 0 l0 9 l-9.5 0 z" fill="#fff" stroke="#666" />
    <text x="44" y="495" font-size="14" stroke="none" fill="#666">Billing rework</text>
  </g>

  <!-- ===== AGENTS section (active state) ===== -->
  <text x="16" y="534" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">AGENTS</text>
  <text x="248" y="534" font-size="14" stroke="none" fill="#666">+</text>
  <!-- active agent rows with live dot + "N live" -->
  <g>
    <circle cx="24" cy="554" r="8" fill="#e6e6e6" stroke="#666" />
    <text x="44" y="559" font-size="14" stroke="none" fill="#666">ClaudeCoder</text>
    <circle cx="214" cy="554" r="3" fill="#000" stroke="none" />
    <text x="224" y="558" font-size="12" stroke="none" fill="#666">2 live</text>
  </g>
  <g>
    <circle cx="24" cy="586" r="8" fill="#e6e6e6" stroke="#666" />
    <text x="44" y="591" font-size="14" stroke="none" fill="#666">QA-Bot</text>
    <circle cx="214" cy="586" r="3" fill="#000" stroke="none" />
    <text x="224" y="590" font-size="12" stroke="none" fill="#666">1 live</text>
  </g>

  <!-- ===== COMPANY section ===== -->
  <text x="16" y="634" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">COMPANY</text>
  <rect x="16" y="646" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="661" font-size="14" stroke="none" fill="#666">Org</text>
  <rect x="16" y="678" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="693" font-size="14" stroke="none" fill="#666">Settings</text>

  <!-- ============ CONTENT AREA (faded, context only) ============ -->
  <text x="320" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Main content area</text>
  <line x1="320" y1="56" x2="1256" y2="56" stroke="#666" />
  <text x="320" y="84" font-size="14" stroke="none" fill="#666">(Selected nav item renders here — e.g. the Projects list view)</text>

  <!-- legend of changes -->
  <g transform="translate(320,120)">
    <rect width="640" height="232" rx="6" fill="#fff" stroke="#666" />
    <text x="20" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">What changed in the left nav</text>
    <text x="20" y="64" font-size="14" stroke="none" fill="#000">1  Conference room — NEW item above New task, chat-bubble icon</text>
    <text x="20" y="92" font-size="14" stroke="none" fill="#000">2  New Issue  →  New task; label uses the standard nav color</text>
    <text x="20" y="120" font-size="14" stroke="none" fill="#000">3  Projects — NEW Work nav item; opens the all-projects list view</text>
    <text x="20" y="148" font-size="14" stroke="none" fill="#000">4  Artifacts — NEW item in the Work section</text>
    <text x="20" y="176" font-size="14" stroke="none" fill="#000">5  Project tiles — gray rounded rectangle + folder icon (was a</text>
    <text x="36" y="196" font-size="14" stroke="none" fill="#000">colored squircle); color + icon are user-customizable</text>
    <text x="20" y="220" font-size="14" stroke="none" fill="#000">6  Agents — active agents only; recently-active fallback (see 04)</text>
  </g>

  <!-- ============ ANNOTATION LAYER (red dashed) ============ -->
  <g data-region="annotations">
    <rect x="8" y="56" width="264" height="32" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,72)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text></g>

    <rect x="8" y="92" width="264" height="20" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,104)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text></g>

    <g transform="translate(286,266)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>

    <rect x="8" y="288" width="264" height="20" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,298)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text></g>

    <rect x="8" y="412" width="264" height="92" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,418)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text></g>

    <rect x="8" y="524" width="264" height="80" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,560)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">6</text></g>
  </g>
</svg>
