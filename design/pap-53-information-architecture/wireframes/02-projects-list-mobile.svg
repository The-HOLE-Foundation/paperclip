<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="812" />

  <!-- top bar -->
  <text x="16" y="34" font-size="20" stroke="none" fill="#000">≡</text>
  <text x="48" y="34" font-size="20" font-weight="700" stroke="none" fill="#000">Projects</text>
  <line x1="0" y1="56" x2="375" y2="56" stroke="#666" />

  <!-- toolbar -->
  <g transform="translate(16,72)">
    <rect width="120" height="32" rx="4" fill="#fff" stroke="#666" />
    <text x="14" y="21" font-size="12" stroke="none" fill="#666">Sort: Name</text>
  </g>
  <g transform="translate(239,72)">
    <rect width="120" height="32" rx="4" fill="#000" />
    <text x="60" y="21" font-size="12" text-anchor="middle" stroke="none" fill="#fff">+ Add</text>
  </g>

  <!-- stacked cards: each row reflows to a card with metrics on a second line -->
  <g transform="translate(16,120)">
    <rect width="343" height="96" fill="#fff" stroke="#666" />
    <rect x="16" y="16" width="32" height="28" rx="6" fill="#e6e6e6" stroke="#666" />
    <path d="M24 28 l7 0 l2 -3 l7 0 l0 14 l-16 0 z" fill="#fff" stroke="#666" />
    <text x="60" y="30" font-size="14" font-weight="600" stroke="none" fill="#000">Onboarding v3</text>
    <text x="60" y="48" font-size="12" stroke="none" fill="#666">Revamp first-run onboarding.</text>
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">24 tasks · $1,200/mo · Active</text>
  </g>
  <g transform="translate(16,224)">
    <rect width="343" height="96" fill="#fff" stroke="#666" />
    <rect x="16" y="16" width="32" height="28" rx="6" fill="#e6e6e6" stroke="#666" />
    <path d="M24 28 l7 0 l2 -3 l7 0 l0 14 l-16 0 z" fill="#fff" stroke="#666" />
    <text x="60" y="30" font-size="14" font-weight="600" stroke="none" fill="#000">NUX hardening</text>
    <text x="60" y="48" font-size="12" stroke="none" fill="#666">Stabilize BoardChat + QA.</text>
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">11 tasks · No budget · Active</text>
  </g>
  <g transform="translate(16,328)">
    <rect width="343" height="96" fill="#fff" stroke="#666" />
    <rect x="16" y="16" width="32" height="28" rx="6" fill="#e6e6e6" stroke="#666" />
    <path d="M24 28 l7 0 l2 -3 l7 0 l0 14 l-16 0 z" fill="#fff" stroke="#666" />
    <text x="60" y="30" font-size="14" font-weight="600" stroke="none" fill="#000">Billing rework</text>
    <text x="60" y="48" font-size="12" stroke="none" fill="#666">Per-project spend tracking.</text>
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">7 tasks · $500/mo · Paused</text>
  </g>

  <!-- bottom tab bar -->
  <line x1="0" y1="748" x2="375" y2="748" stroke="#666" />
  <text x="40" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Home</text>
  <text x="120" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Issues</text>
  <text x="200" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#000">＋</text>
  <text x="270" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Agents</text>
  <text x="340" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Inbox</text>

  <g data-region="annotations">
    <rect x="16" y="192" width="343" height="24" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(351,204)"><circle r="10" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text></g>
  </g>
</svg>
