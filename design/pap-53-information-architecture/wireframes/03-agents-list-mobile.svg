<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="812" />

  <text x="16" y="34" font-size="20" stroke="none" fill="#000">≡</text>
  <text x="48" y="34" font-size="20" font-weight="700" stroke="none" fill="#000">All agents</text>
  <line x1="0" y1="56" x2="375" y2="56" stroke="#666" />

  <g transform="translate(16,72)">
    <rect width="160" height="32" rx="4" fill="#fff" stroke="#666" />
    <text x="14" y="21" font-size="12" stroke="none" fill="#666">Filter: All status</text>
  </g>

  <!-- card 1: identity, then actions wrap to their own row -->
  <g transform="translate(16,120)">
    <rect width="343" height="128" fill="#fff" stroke="#666" />
    <circle cx="36" cy="36" r="16" fill="#e6e6e6" stroke="#666" />
    <text x="64" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">ClaudeCoder</text>
    <text x="64" y="50" font-size="12" stroke="none" fill="#666">Software Engineer · 2 live</text>
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">$42 / $200 mo · active 2m ago</text>
    <g transform="translate(16,88)"><rect width="100" height="28" rx="4" fill="#fff" stroke="#666" /><text x="50" y="19" font-size="12" text-anchor="middle" stroke="none" fill="#000">+ Assign</text></g>
    <g transform="translate(124,88)"><rect width="116" height="28" rx="4" fill="#fff" stroke="#666" /><text x="58" y="19" font-size="12" text-anchor="middle" stroke="none" fill="#000">▷ Heartbeat</text></g>
    <g transform="translate(248,88)"><rect width="80" height="28" rx="4" fill="#fff" stroke="#666" /><text x="40" y="19" font-size="12" text-anchor="middle" stroke="none" fill="#000">❙❙ Pause</text></g>
  </g>

  <!-- card 2 -->
  <g transform="translate(16,264)">
    <rect width="343" height="128" fill="#fff" stroke="#666" />
    <circle cx="36" cy="36" r="16" fill="#e6e6e6" stroke="#666" />
    <text x="64" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Designer</text>
    <text x="64" y="50" font-size="12" stroke="none" fill="#666">Product Design · paused</text>
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">$0 / $80 mo · active 3d ago</text>
    <g transform="translate(16,88)"><rect width="100" height="28" rx="4" fill="#fff" stroke="#666" /><text x="50" y="19" font-size="12" text-anchor="middle" stroke="none" fill="#000">+ Assign</text></g>
    <g transform="translate(124,88)"><rect width="116" height="28" rx="4" fill="#fff" stroke="#666" /><text x="58" y="19" font-size="12" text-anchor="middle" stroke="none" fill="#000">▷ Heartbeat</text></g>
    <g transform="translate(248,88)"><rect width="80" height="28" rx="4" fill="#fff" stroke="#666" /><text x="40" y="19" font-size="12" text-anchor="middle" stroke="none" fill="#000">▷ Resume</text></g>
  </g>

  <!-- bottom tab bar -->
  <line x1="0" y1="748" x2="375" y2="748" stroke="#666" />
  <text x="40" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Home</text>
  <text x="120" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Issues</text>
  <text x="200" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#000">＋</text>
  <text x="270" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#000">Agents</text>
  <text x="340" y="784" font-size="12" text-anchor="middle" stroke="none" fill="#666">Inbox</text>

  <g data-region="annotations">
    <rect x="16" y="208" width="343" height="40" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(351,228)"><circle r="10" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text></g>
  </g>
</svg>
